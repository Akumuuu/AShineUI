<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AShineUI Theme Preview</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="header">
    <h1 id="title">AShineUI Preview</h1>
    <p class="subtitle">Example HTML for VSCode theme preview</p>
  </header>

  <main class="container">

    <section class="card">
      <h2>Login Form</h2>

      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@mail.com" />

        <label for="password">Password</label>
        <input type="password" id="password" />

        <button type="submit">Login</button>
      </form>
    </section>

    <section class="card">
      <h2>User List</h2>

      <ul id="users">
        <li data-id="1">John Doe</li>
        <li data-id="2">Jane Smith</li>
        <li data-id="3">Alex Johnson</li>
      </ul>
    </section>

  </main>

  <script src="script.js"></script>
</body>

</html>
